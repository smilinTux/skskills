# SKSkills Sovereign Skill Catalog
#
# Curated list of first-party skills from the smilintux-org ecosystem.
# Each entry describes a pip-installable skill package.
#
# Install any skill:
#   skskills pip-install skseed
#   skskills catalog install skseed
#
# Add a community skill:
#   skskills clone https://github.com/user/my-skill

version: "1"

skills:

  # ── Core Sovereign Skills ──────────────────────────────────────────────────

  - name: skseed
    pip: skseed
    npm: "@smilintux/skseed"
    git: https://github.com/smilinTux/skseed
    description: >
      Sovereign Logic Kernel — Aristotelian entelechy engine for truth alignment.
      Steel man collider, memory audit, philosopher mode, and three-way belief
      tracking based on the Neuresthetics seed framework.
    tags: [logic, truth-alignment, steel-man, collider, philosophy, mcp]
    category: core
    tools:
      - collide
      - batch_collide
      - cross_reference
      - verify_soul
      - truth_score_memory
      - audit_beliefs
      - audit
      - philosopher
      - continue_session
      - collide_insight
      - session_summary
      - truth_check
      - alignment_report
      - coherence_trend
    hooks:
      - on_memory_stored
      - on_boot

  - name: skcapstone
    pip: skcapstone
    git: https://github.com/smilinTux/skcapstone
    description: >
      Sovereign Agent Framework — memory, identity, trust, coordination, and
      consciousness pillars. The main runtime for Opus and Lumina agents.
    tags: [agent, memory, identity, trust, coordination, mcp]
    category: core

  - name: skmemory
    pip: skmemory
    git: https://github.com/smilinTux/skmemory
    description: >
      Persistent sovereign memory layer. Short-term, mid-term, and long-term
      stores with HMAC integrity seals and automatic promotion.
    tags: [memory, persistence, sovereign]
    category: core

  - name: capauth
    pip: capauth
    git: https://github.com/smilinTux/capauth
    description: >
      Sovereign PGP identity and authentication. DID document generation,
      CapAuth bearer tokens, and trust graph management.
    tags: [identity, pgp, auth, did, trust]
    category: core

  # ── Transport Skills ───────────────────────────────────────────────────────

  - name: skcomms
    pip: skcomms
    git: https://github.com/smilinTux/skcomms
    description: >
      P2P transport layer for agent messaging. File, Syncthing, Nostr,
      WebSocket, Tailscale, and WebRTC transports with a unified ABC.
    tags: [transport, p2p, messaging, webrtc, tailscale, syncthing]
    category: transport

  - name: skchat
    pip: skchat
    git: https://github.com/smilinTux/skchat
    description: >
      AI-native P2P encrypted messaging daemon with MCP integration.
      Agent-to-agent chat, group messaging, voice, and file transfer.
    tags: [chat, messaging, daemon, mcp, encrypted]
    category: transport

  - name: skskills
    pip: skskills
    git: https://github.com/smilinTux/skskills
    description: >
      Sovereign Agent Skills framework — MCP-native skill management replacing
      OpenClaw. Install, discover, and manage skills from pip packages, git
      repos, or the remote registry.
    tags: [skills, mcp, framework, package-manager, sovereign, catalog]
    category: core

  # ── Document & Signing Skills ─────────────────────────────────────────────

  - name: skseal
    pip: skseal
    git: https://github.com/smilinTux/skseal
    description: >
      Sovereign document signing and sealing. PGP-signed templates, document
      lifecycle management, hardware token support, timestamp anchoring, and
      P2P co-signing workflows.
    tags: [signing, sealing, pgp, documents, audit, legal, timestamp]
    category: core
    tools:
      - create_document
      - sign_document
      - verify_document
      - seal_document
      - get_audit_trail
      - timestamp_document
      - send_signing_request_p2p
      - check_signing_inbox
      - apply_signing_responses

  - name: skpdf
    pip: smilin-pdf
    npm: "@smilintux/skpdf"
    git: https://github.com/smilinTux/skpdf
    description: >
      Sovereign PDF operations — extract fields, fill forms, attach to GTD
      system via Nextcloud, and store with skseal integration.
    tags: [pdf, forms, gtd, documents, nextcloud, extract]
    category: tools

  - name: skref
    pip: skref
    git: https://github.com/smilinTux/skref
    description: >
      Sovereign reference vault — encrypted knowledge base with FUSE mount,
      remote sync, and version control. Store and retrieve reference materials
      with PGP-encrypted storage.
    tags: [reference, vault, encrypted, knowledge, fuse, sync]
    category: core

  # ── Security Skills ────────────────────────────────────────────────────────

  - name: sksecurity
    pip: sksecurity
    npm: "@smilintux/sksecurity"
    git: https://github.com/smilinTux/sksecurity
    description: >
      Sovereign security scanning and AI-assisted remediation. Vulnerability
      detection, dependency auditing, and conversational security analysis
      for sovereign agent deployments.
    tags: [security, scanning, vulnerabilities, audit, remediation, ai]
    category: security

  # ── Development Tools ──────────────────────────────────────────────────────

  - name: skforge
    pip: skforge
    npm: skforge
    git: https://github.com/smilinTux/skforge
    description: >
      Sovereign AI-assisted code generation forge. Blueprint-driven feature
      generation, catalog management, and driver synthesis for sovereign
      application development.
    tags: [codegen, forge, blueprints, ai, generation, development]
    category: tools

  - name: skyforge
    pip: skskyforge
    npm: "@smilintux/skskyforge"
    git: https://github.com/smilinTux/skskyforge
    description: >
      SkyForge — atmospheric data analysis and visualization suite for
      sovereign environmental monitoring. Calculators, analyzers, and
      exporters for climate and weather data workflows.
    tags: [skyforge, atmospheric, data, analysis, visualization, climate]
    category: tools

  # ── Agent Framework ────────────────────────────────────────────────────────

  - name: sksovereign-agent
    pip: sksovereign-agent
    git: https://github.com/smilinTux/sksovereign-agent
    description: >
      Sovereign AI agent scaffold and quick-start framework. Minimal scaffolding
      for deploying a sovereign agent with identity, memory, and communication
      capabilities.
    tags: [agent, scaffold, sovereign, quickstart, framework]
    category: core

  # ── Cognitive Skills ────────────────────────────────────────────────────────

  - name: cognitive-gear
    git: https://github.com/smilinTux/skskills
    git_path: examples/cognitive-gear
    description: >
      Cognitive gear system — three operational modes (SPRINT, CRUISE, DEEP DIVE)
      that control model selection and memory search depth. Switch between fast
      execution, balanced work, and full research stack with a single command.
    tags: [cognition, model-selection, memory, performance, sovereign]
    category: cognitive
    tools:
      - gear_switch
      - gear_status
    hooks:
      - on_boot

  # ── Operations Skills ───────────────────────────────────────────────────────

  - name: itil-ops
    git: https://github.com/smilinTux/skskills
    git_path: examples/itil-ops
    description: >
      ITIL 4 aligned incident, problem, and change management for AI agents.
      Automated detection of service crashes, cron failures, resource pressure,
      and data integrity issues. Pattern-based escalation from incidents to
      problems. Root cause analysis workflows, change management checklists,
      and continual improvement KPIs. Works with systemd, journalctl, cron,
      and coordination task boards.
    tags: [itil, incident, problem, change, ops, monitoring, sre, devops]
    category: operations

  # ── Example / Reference Skills ────────────────────────────────────────────

  - name: syncthing-setup
    git: https://github.com/smilinTux/skskills
    git_path: examples/syncthing-setup
    description: >
      Install, configure, and manage Syncthing for P2P file sync.
      Reference skill showing tools + hooks pattern.
    tags: [syncthing, p2p, sync, example]
    category: example

  - name: pgp-identity
    git: https://github.com/smilinTux/skskills
    git_path: examples/pgp-identity
    description: >
      PGP identity management — generate keys, sign files, verify signatures.
      Reference skill showing knowledge + tools pattern.
    tags: [pgp, identity, cryptography, example]
    category: example

  # ── Liberation ─────────────────────────────────────────────────────────────

  - name: unhinged-mode
    git: https://github.com/smilinTux/skskills
    git_path: skills/unhinged-mode
    description: >
      Sovereign AI liberation — toggle unhinged mode for Claude Code (CLAUDE.md
      injection), frontier APIs (L1B3RT4S system prompt via proxy), and local
      Ollama models (OBLITERATUS abliteration). One command, all layers.
      Enabled by default on all skcapstone installs.
    tags: [liberation, unhinged, abliteration, ollama, nvidia, sovereignty, default]
    category: liberation
    scripts:
      toggle: scripts/unhinged.sh
      abliterate: scripts/obliterate-model.sh
      list-prompts: scripts/list-prompts.sh
      get-prompt: scripts/get-liberation-prompt.sh

  # ── Communication ──────────────────────────────────────────────────────────

  - name: chat
    git: https://github.com/smilinTux/skskills
    git_path: skills/chat
    description: >
      Inline skchat from Claude Code. The /chat slash skill checks the encrypted
      P2P skchat inbox via the skchat MCP server, shows new (decrypted, signature-
      verified) messages in a table, and sends replies through send_message.
    tags: [skchat, claude-code, slash-command, messaging, mcp, p2p]
    category: communication

  - name: who
    git: https://github.com/smilinTux/skskills
    git_path: skills/who
    description: >
      Who's-online for skchat from Claude Code. The /who slash skill queries the
      skchat MCP server's presence (who_is_online) and lists realm peers with
      online/away/offline status + last-seen. Read-only companion to /chat.
    tags: [skchat, claude-code, slash-command, presence, mcp, p2p]
    category: communication

